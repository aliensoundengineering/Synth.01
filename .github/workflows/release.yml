name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            cmake_args: ""
            archive_ext: zip
          - name: windows-arm64
            os: windows-latest
            cmake_args: "-A ARM64"
            archive_ext: zip
          - name: macos-universal
            os: macos-latest
            cmake_args: '-DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0'
            archive_ext: zip
          - name: linux-x64
            os: ubuntu-latest
            cmake_args: ""
            archive_ext: tar.gz

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config ninja-build \
            libasound2-dev libjack-jackd2-dev ladspa-sdk \
            libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libglu1-mesa-dev mesa-common-dev

      - name: Install Ninja (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ninja

      - name: Configure (Unix)
        if: matrix.os != 'windows-latest'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_args }}

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build -G "Visual Studio 17 2022" ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage artefacts
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="dev"
          STAGE="stage/Synth.01-v${VERSION}-${{ matrix.name }}"
          mkdir -p "$STAGE"
          ART="build/Synth.01_artefacts/Release"
          if [ -d "$ART/VST3" ];       then cp -R "$ART/VST3/."       "$STAGE/"; fi
          if [ -d "$ART/AU" ];         then cp -R "$ART/AU/."         "$STAGE/"; fi
          if [ -d "$ART/Standalone" ]; then cp -R "$ART/Standalone/." "$STAGE/"; fi
          # Strip Windows PDBs / import libs so we don't ship them.
          find "$STAGE" \( -name "*.pdb" -o -name "*.exp" -o -name "*.lib" -o -name "*.ilk" \) -delete || true
          ls -laR "$STAGE"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: bash
        run: |
          cd "stage/Synth.01-v${VERSION}-${{ matrix.name }}"
          7z a -tzip "../Synth.01-v${VERSION}-${{ matrix.name }}.zip" "*" \
            || zip -r "../Synth.01-v${VERSION}-${{ matrix.name }}.zip" .

      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          cd stage
          tar czf "Synth.01-v${VERSION}-${{ matrix.name }}.tar.gz" -C "Synth.01-v${VERSION}-${{ matrix.name }}" .

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: Synth.01-${{ matrix.name }}
          path: stage/Synth.01-v*.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
